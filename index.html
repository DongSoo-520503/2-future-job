<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>22개국 미래 직업 진단</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            background: linear-gradient(160deg, #fce4ec 0%, #e8eaf6 40%, #e0f7fa 100%);
            font-family: 'Noto Sans KR', sans-serif;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 12px 10px;          /* ← 줄임 */
            position: relative;
            overflow-x: hidden;
        }

        body::before, body::after { display: none; } /* 배경 원 불필요 + 공간 절약 */

        .card {
            background: rgba(255,255,255,0.84);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255,255,255,0.95);
            border-radius: 20px;          /* 살짝 작게 */
            padding: 16px 24px 20px;      /* 상하좌우 모두 줄임 */
            width: 100%;
            max-width: 640px;
            box-shadow:
                0 3px 16px rgba(180,150,255,0.12),
                0 16px 40px rgba(120,120,200,0.11);
            animation: fadeUp 0.65s cubic-bezier(.16,1,.3,1) both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .title-box {
            background: linear-gradient(135deg, #a78bfa 0%, #f0abfc 55%, #93c5fd 100%);
            border-radius: 40px;
            padding: 8px 24px;            /* ↑↓ 줄임 */
            text-align: center;
            margin-bottom: 8px;           /* 줄임 */
            box-shadow: 0 4px 16px rgba(167,139,250,0.3);
        }
        .title-box h1 {
            font-size: 21px;              /* 살짝 작게 */
            font-weight: 900;
            color: #fff;
            letter-spacing: -0.4px;
        }

        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, #c4b5fd, #93c5fd, transparent);
            margin: 10px 0;               /* 줄임 */
        }

        .form-group {
            margin-bottom: 10px;          /* ← 대폭 줄임 */
        }

        label { margin-bottom: 3px; }

        .label-main {
            font-size: 13.5px;            /* 살짝 작게 */
            font-weight: 700;
            color: #2d2250;
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 3px;
        }
        .label-main .icon {
            width: 22px; height: 22px;
            border-radius: 6px;
            font-size: 12.5px;
        }
        .label-hint {
            font-size: 11.5px;
            padding: 2px 8px;
            line-height: 1.5;
        }

        input[type="text"],
        input[type="date"],
        select {
            width: 100%;
            padding: 8px 14px;            /* ↑↓ 줄임 */
            background: rgba(245,243,255,0.7);
            border: 1.5px solid #ddd6fe;
            border-radius: 10px;
            color: #2d2250;
            font-size: 13.5px;            /* 살짝 작게 */
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        select {
            background-position: right 12px center;
            padding-right: 32px;
        }

        input:focus, select:focus {
            border-color: #a78bfa;
            box-shadow: 0 0 0 3px rgba(167,139,250,0.16);
        }

        .submit-btn {
            width: 100%;
            padding: 11px;                /* ↑↓ 줄임 */
            margin-top: 4px;              /* 거의 없앰 */
            background: linear-gradient(135deg, #a78bfa 0%, #f0abfc 50%, #93c5fd 100%);
            border: none;
            border-radius: 50px;
            color: #fff;
            font-size: 15px;              /* 살짝 작게 */
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(167,139,250,0.4);
        }
        .submit-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(167,139,250,0.5);
        }

        /* 모바일 최적화 강화 */
        @media (max-width: 600px) {
            body { padding: 10px 8px; }
            .card { padding: 14px 18px 18px; border-radius: 16px; }
            .title-box h1 { font-size: 20px; }
            .form-group { margin-bottom: 9px; }
            input, select { font-size: 14px; padding: 10px 14px; }
            .submit-btn { padding: 12px; font-size: 16px; }
        }

        @media (max-height: 680px) {
            .title-box { margin-bottom: 6px; padding: 7px 20px; }
            .title-box h1 { font-size: 19px; }
            .form-group { margin-bottom: 8px; }
            .submit-btn { margin-top: 2px; padding: 10px; font-size: 15px; }
        }
    </style>
</head>
<body>
    <div class="card">

        <div class="title-box">
            <h1>미래 직업 추천 시스템</h1>
        </div>

        <div class="divider"></div>

        <form id="jobForm">

            <div class="form-group">
                <label>
                    <div class="label-main">
                        <span class="icon icon-name">👤</span> 성명
                    </div>
                </label>
                <input type="text" id="name" placeholder="이름을 입력하세요" required>
            </div>

            <div class="form-group">
                <label>
                    <div class="label-main">
                        <span class="icon icon-dob">📅</span> 출생연도
                    </div>
                </label>
                <input type="text" id="dob" placeholder="2016  (YYYY)" pattern="\d{4}" required>
            </div>

            <div class="form-group">
                <label>
                    <div class="label-main">
                        <span class="icon icon-country">🌍</span>취업 국가 (22개국)
                    </div>
                </label>
                <select id="country">
                    <option value="대한민국">대한민국</option>
                    <!-- … 나머지 국가 옵션 그대로 … -->
                </select>
            </div>

            <div class="form-group">
                <label>
                    <div class="label-main">
                        <span class="icon icon-ability">⭐</span> 지능/성적/노력
                    </div>
                </label>
                <select id="ability">
                    <option value="상">대학원 또는 박사 과정 학업 예정</option>
                    <option value="중">대학교 또는 대학원 과정 학업 예정</option>
                    <option value="하">실업고 또는 전문대 이하 학업 예정</option>
                </select>
            </div>

            <div class="form-group">
                <label>
                    <div class="label-main">
                        <span class="icon icon-riasec">🧩</span> 직업흥미유형 (RIASEC)
                    </div>
                </label>
                <select id="riasec">
                    <option value="R">🔧 만들고 조작하는 걸 좋아해요 — 기계·컴퓨터·도구를 직접 다루거나 만드는 것이 재미있는 편이에요</option>
                    <!-- … 나머지 옵션 그대로 … -->
                </select>
            </div>

            <div class="form-group">
                <label>
                    <div class="label-main">
                        <span class="icon icon-big5">🧠</span> 개인성향 (Big 5)
                    </div>
                </label>
                <select id="big5">
                    <option value="O">🌈 새로운 것에 호기심이 많아요 — 새 아이디어나 변화를 즐기고 상상력이 풍부한 편이에요</option>
                    <!-- … 나머지 옵션 그대로 … -->
                </select>
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">✨ 진단 결과 보기</button>
        </form>

    </div>

    <!-- 스크립트 부분은 그대로 유지 -->
    <script>
      // … 기존 스크립트 그대로 복사해서 넣으세요 …
    </script>
</body>
</html>
